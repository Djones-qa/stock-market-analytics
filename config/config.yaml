project:
  name: "Stock Market Analytics"
  version: "1.0.0"
  author: "Darrius Jones"
  description: "Price trend analysis, portfolio optimization, and stock forecasting"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  external_dir: "data/external"
  price_column: "close"
  date_column: "date"
  ticker_column: "ticker"
  volume_column: "volume"

market:
  benchmark: "SPY"
  risk_free_rate: 0.045
  trading_days_per_year: 252

price_columns:
  - open
  - high
  - low
  - close
  - adj_close
  - volume

sectors:
  - Technology
  - Healthcare
  - Financials
  - Energy
  - Consumer Discretionary
  - Industrials
  - Utilities
  - Real Estate
  - Materials
  - Communication Services
  - Consumer Staples

technical_indicators:
  moving_averages: [20, 50, 100, 200]
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bollinger_period: 20
  bollinger_std: 2
  atr_period: 14

risk_metrics:
  var_confidence: 0.95
  sharpe_risk_free: 0.045
  max_drawdown_window: 252

model:
  test_size: 0.2
  random_state: 42
  cv_folds: 5
  forecast_horizon: 30
  algorithms:
    - linear_regression
    - ridge
    - random_forest
    - gradient_boosting
    - xgboost

visualization:
  style: "seaborn-v0_8-whitegrid"
  palette: "tab10"
  figure_dpi: 150
  output_dir: "visualizations/output"
